<section class="form-section">
  <div class="form-panel">
    <h2>Crear cuenta</h2>

    <div class="photo-slot-container">
      <app-photo-slot
        [imageUrl]="profileImage()"
        placeholderText="Subir foto de perfil"
        size="xl"
        shape="circle"
        (photoClick)="handlePhotoClick()" />
    </div>

    <form
      [formGroup]="registerFormGroup"
      (ngSubmit)="onRegister()">
      <div class="form-control">
        <label
          class="form-label"
          for="register-name"
          >Nombre:</label
        >
        <input
          id="register-name"
          class="form-input"
          type="text"
          formControlName="name"
          name="name"
          placeholder="Nombre" />
        <app-form-error-message
          [control]="registerFormGroup.get('name')"
          label="Nombre" />
      </div>

      <div class="form-control">
        <label
          class="form-label"
          for="register-last-name"
          >Apellido:</label
        >
        <input
          id="register-last-name"
          class="form-input"
          type="text"
          formControlName="lastName"
          name="lastName"
          placeholder="Apellido" />
        <app-form-error-message
          [control]="registerFormGroup.get('lastName')"
          label="Apellido" />
      </div>

      <div class="form-control">
        <label
          class="form-label"
          for="register-username"
          >Nombre de usuario:</label
        >
        <input
          id="register-username"
          class="form-input"
          type="text"
          formControlName="username"
          name="username"
          placeholder="Nombre de usuario" />
        <app-form-error-message
          [control]="registerFormGroup.get('username')"
          label="Nombre de usuario" />
      </div>

      <div class="form-control">
        <label
          class="form-label"
          for="register-birth-date"
          >Fecha de nacimiento:</label
        >
        <p-datepicker
          inputId="register-birth-date"
          class="form-input"
          formControlName="birthDate"
          dateFormat="dd/mm/yy"
          placeholder="dd/mm/yyyy"
          pInputMask="99/99/9999" />
        <app-form-error-message
          [control]="registerFormGroup.get('birthDate')"
          label="Fecha de nacimiento"></app-form-error-message>
      </div>

     

      <div class="form-control">
        <label
          class="form-label"
          for="register-password"
          >Contraseña:</label
        >
        <input
          id="register-password"
          class="form-input"
          type="password"
          formControlName="password"
          name="password"
          placeholder="Contraseña" />
        <app-form-error-message
          [control]="registerFormGroup.get('password')"
          label="Contraseña" />
      </div>

      <div class="form-control">
        <label
          class="form-label"
          for="register-confirm-password"
          >Repetir contraseña:</label
        >
        <input
          id="register-confirm-password"
          class="form-input"
          type="password"
          formControlName="confirmPassword"
          name="confirmPassword"
          placeholder="Repetir contraseña" />
        <app-form-error-message
          [control]="registerFormGroup.get('confirmPassword')"
          label="Repetir contraseña" />
      </div>

      <div class="form-control">
        <label
          class="form-label"
          for="register-description"
          >Descripción breve:</label
        >
        <textarea
          id="register-description"
          class="form-input"
          formControlName="description"
          name="description"
          placeholder="Descripción breve"
          rows="3"></textarea>
        <app-form-error-message
          [control]="registerFormGroup.get('description')"
          label="Descripción breve" />
      </div>

      <div class="form-actions">
        <app-button
          [buttonModel]="registerButtonModel()"
          type="submit"></app-button>
      </div>
    </form>
  </div>
</section>
