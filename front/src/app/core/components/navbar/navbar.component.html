<aside
  class="sidebar"
  [class.collapsed]="collapsed()">
  <div
    class="sidebar-header"
    (click)="onMobileHeaderClick()">
    <a
      class="sidebar-logo"
      routerLink="/publicaciones"
      (click)="$event.stopPropagation()">
      @if (collapsed()) {
        <i class="pi pi-verified logo-icon"></i>
      } @else {
        <i class="pi pi-verified logo-icon"></i>
        <span class="logo-text">RedSocial</span>
      }
    </a>
  </div>

  <nav class="sidebar-nav">
    @for (item of menuItems(); track item.label) {
      <a
        class="sidebar-item"
        [class.active]="item.active?.()"
        [routerLink]="item.route ?? null"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="onItemClick(item)">
        <i [class]="item.icon"></i>
        @if (!collapsed()) {
          <span class="sidebar-item-label">{{ item.label }}</span>
        }
      </a>
    }
    @if (sessionTimer.showTimer() && !collapsed()) {
      <div class="sidebar-timer">
        <app-timer
          [initialTime]="600"
          [resetTimer]="sessionTimer.resetSignal()"
          [paused]="!sessionTimer.isRunning()"
          (timeIsFinished)="onTimerFinished()" />
      </div>
    }
    <div class="sidebar-nav-spacer"></div>
    <a
      class="sidebar-item"
      (click)="toggleCollapse.emit()">
      <i [class]="collapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'"></i>
      @if (!collapsed()) {
        <span class="sidebar-item-label">Colapsar menú</span>
      }
    </a>
  </nav>

  @if (currentUser(); as user) {
    <div class="sidebar-footer">
      <div
        class="sidebar-user"
        [class.justify-center]="collapsed()">
        <app-photo-slot
          [imageUrl]="user.profileImage || null"
          [name]="user.name"
          [lastName]="user.lastName"
          size="md"
          shape="circle"
          placeholderIcon="pi pi-user"
          placeholderText=""
          [readonly]="true" />
        @if (!collapsed()) {
          <div class="sidebar-user-info">
            <span class="sidebar-user-name">{{ user.username }}</span>
          </div>
        }
      </div>
    </div>
  }
</aside>
