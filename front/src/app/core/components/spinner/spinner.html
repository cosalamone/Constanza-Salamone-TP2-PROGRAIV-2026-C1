<div
  class="spinner"
  [class.spinner--overlay]="overlay()"
  [class.spinner--small]="size() === 'small'"
  [class.spinner--large]="size() === 'large'"
>
  <div class="spinner__content">
    <i class="pi pi-spin pi-spinner spinner__icon"></i>
    @if (text()) {
      <span class="spinner__text">{{ text() }}</span>
    }
  </div>
</div>
